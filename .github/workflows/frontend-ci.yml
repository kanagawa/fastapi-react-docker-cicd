name: Frontend CI
on:
  push:
    branches: ["**"]
    paths: ['frontend/**', 'openapi.json','**.github/workflows/frontend-ci.yml']
  pull_request:
    branches: ["**"]
    paths: ['frontend/**', 'openapi.json']

jobs:
  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Vitest
        run: npx vitest run

      - name: Build check
        run: npm run build