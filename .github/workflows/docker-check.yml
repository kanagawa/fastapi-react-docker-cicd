name: Docker Build Check

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Backend Docker Check ---
      - name: Build Backend Image
        run: docker build -t backend-test -f ./backend/docker/Dockerfile ./backend

      - name: Test Backend Container Startup
        run: |
          docker run -d --name backend-container -p 8000:8000 backend-test
          # サーバーが起動するまで待機 (最大30秒)
          timeout 30s bash -c 'until curl -s localhost:8000/docs > /dev/null; do sleep 2; done'
          docker ps | grep backend-container

      # --- Frontend Docker Check ---
      - name: Build Frontend Image
        run: docker build -t frontend-test -f ./frontend/frontend/Dockerfile ./frontend

      - name: Test Frontend Container Startup
        run: |
          docker run -d --name frontend-container -p 3000:3000 frontend-test
          # 起動確認
          timeout 30s bash -c 'until curl -s localhost:3000 > /dev/null; do sleep 2; done'
          docker ps | grep frontend-container

      # --- Cleanup ---
      - name: Stop Containers
        if: always()
        run: docker rm -f backend-container frontend-container || true